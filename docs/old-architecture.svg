  <text x="500.0" y="60.4" fill="#1e40af" font-size="24" font-family="monospace" text-anchor="middle">旧架构：Agent 三层漏斗模型</text>
  <text x="500.0" y="83.05" fill="#64748b" font-size="13" font-family="monospace" text-anchor="middle">Native 进程直接执行 · 无 WASM 沙盒 · 16 个 CLI 命令（现全部不可达）</text>
  <text x="50" y="119.75" fill="#3b82f6" font-size="15" font-family="monospace" text-anchor="start">CLI 命令入口</text>
  <text x="150.0" y="149.8" fill="#374151" font-size="13" font-family="monospace" text-anchor="middle">paporot snapshot</text>
  <text x="150.0" y="166.05" fill="#374151" font-size="13" font-family="monospace" text-anchor="middle">创建行为快照</text>
  <text x="350.0" y="149.8" fill="#374151" font-size="13" font-family="monospace" text-anchor="middle">paporot analyze (旧)</text>
  <text x="350.0" y="166.05" fill="#374151" font-size="13" font-family="monospace" text-anchor="middle">全管线分析</text>
  <text x="550.0" y="149.8" fill="#374151" font-size="13" font-family="monospace" text-anchor="middle">paporot review</text>
  <text x="550.0" y="166.05" fill="#374151" font-size="13" font-family="monospace" text-anchor="middle">一键全流程审查</text>
  <text x="660" y="144.35" fill="#64748b" font-size="11" font-family="monospace" text-anchor="start">+ 13 个其他命令:</text>
  <text x="660" y="158.1" fill="#64748b" font-size="11" font-family="monospace" text-anchor="start">trace, diff, coverage, graph,</text>
  <text x="660" y="171.85" fill="#64748b" font-size="11" font-family="monospace" text-anchor="start">state, coupling, feedback 等</text>
  <text x="50" y="257.75" fill="#3b82f6" font-size="15" font-family="monospace" text-anchor="start">Agent 核心调度器</text>
  <text x="450.0" y="269.8" fill="#ffffff" font-size="13" font-family="monospace" text-anchor="middle">Agent::create_snapshot()</text>
  <text x="450.0" y="286.05" fill="#ffffff" font-size="13" font-family="monospace" text-anchor="middle">L1 → L2 → L3 流水线编排 · LLM 重试 · Snapshot 管理</text>
  <text x="50" y="367.75" fill="#3b82f6" font-size="15" font-family="monospace" text-anchor="start">L1 / L2 / L3 分析漏斗</text>
  <text x="160.0" y="394.35" fill="#374151" font-size="11" font-family="monospace" text-anchor="middle">L1: AST/Pattern 解析</text>
  <text x="160.0" y="408.1" fill="#374151" font-size="11" font-family="monospace" text-anchor="middle">DiffPreprocessor</text>
  <text x="160.0" y="421.85" fill="#374151" font-size="11" font-family="monospace" text-anchor="middle">正则提取函数名/行号</text>
  <text x="160.0" y="435.6" fill="#374151" font-size="11" font-family="monospace" text-anchor="middle">confidence 0-1</text>
  <text x="390.0" y="394.35" fill="#374151" font-size="11" font-family="monospace" text-anchor="middle">L2: 规则引擎</text>
  <text x="390.0" y="408.1" fill="#374151" font-size="11" font-family="monospace" text-anchor="middle">RuleEngine::evaluate</text>
  <text x="390.0" y="421.85" fill="#374151" font-size="11" font-family="monospace" text-anchor="middle">标签匹配</text>
  <text x="390.0" y="435.6" fill="#374151" font-size="11" font-family="monospace" text-anchor="middle">breaking/新功能/废弃</text>
  <text x="645.0" y="354.35" fill="#374151" font-size="11" font-family="monospace" text-anchor="middle">L3: LLM Bridge</text>
  <text x="645.0" y="368.1" fill="#374151" font-size="11" font-family="monospace" text-anchor="middle">LlmBridge::enhance</text>
  <text x="645.0" y="381.85" fill="#374151" font-size="11" font-family="monospace" text-anchor="middle">低置信度变更送 LLM</text>
  <text x="645.0" y="395.6" fill="#374151" font-size="11" font-family="monospace" text-anchor="middle">纯 LLM 模式作备用</text>
  <text x="870.0" y="480.6" fill="#374151" font-size="11" font-family="monospace" text-anchor="middle">LLM Client</text>
  <text x="870.0" y="494.35" fill="#374151" font-size="11" font-family="monospace" text-anchor="middle">DeepSeek API</text>
  <text x="50" y="557.75" fill="#3b82f6" font-size="15" font-family="monospace" text-anchor="start">分析结果与存储</text>
  <text x="450.0" y="610.2" fill="#374151" font-size="12" font-family="monospace" text-anchor="middle">BehaviorSnapshot (v3)</text>
  <text x="450.0" y="625.2" fill="#374151" font-size="12" font-family="monospace" text-anchor="middle">capabilities: [...]  ·  prd_coverage: {...}  ·  regression: {...}  ·  risk: {...}</text>
  <text x="450.0" y="714.8" fill="#374151" font-size="13" font-family="monospace" text-anchor="middle">SnapshotStorage</text>
  <text x="450.0" y="731.05" fill="#374151" font-size="13" font-family="monospace" text-anchor="middle">.Paporot/snapshots/&amp;lt;version_id&amp;gt;.json</text>
  <text x="530" y="776.05" fill="#dc2626" font-size="13" font-family="monospace" text-anchor="start">⚠ 全 16 个命令不可达</text>
  <text x="530" y="792.3" fill="#dc2626" font-size="13" font-family="monospace" text-anchor="start">WASM 沙盒返回 Unknown command</text>
