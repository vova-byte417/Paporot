  <text x="450.0" y="143.2" fill="#64748b" font-size="12" font-family="monospace" text-anchor="middle">paporot CLI</text>
  <text x="230.0" y="181.05" fill="#047857" font-size="13" font-family="monospace" text-anchor="middle">✅ Native (src/main.rs)</text>
  <text x="230.0" y="200.2" fill="#374151" font-size="12" font-family="monospace" text-anchor="middle">paporot init</text>
  <text x="230.0" y="215.2" fill="#374151" font-size="12" font-family="monospace" text-anchor="middle">paporot replay [list|show|stats|run]</text>
  <text x="650.0" y="181.05" fill="#6d28d9" font-size="13" font-family="monospace" text-anchor="middle">✅ WASM 沙盒 (wasmtime)</text>
  <text x="650.0" y="200.2" fill="#374151" font-size="12" font-family="monospace" text-anchor="middle">paporot analyze [--prd &amp;lt;path&amp;gt;]</text>
  <text x="650.0" y="215.2" fill="#374151" font-size="12" font-family="monospace" text-anchor="middle">paporot skill list</text>
  <text x="50" y="292.75" fill="#3b82f6" font-size="15" font-family="monospace" text-anchor="start">WASM 沙盒内部 (paporot-core.wasm)</text>
