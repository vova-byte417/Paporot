  <text x="500.0" y="60.4" fill="#1e40af" font-size="24" font-family="monospace" text-anchor="middle">新架构：WASM Skill DAG 沙盒管线</text>
  <text x="500.0" y="83.05" fill="#64748b" font-size="13" font-family="monospace" text-anchor="middle">wasmtime 沙盒 · 4 个可用命令 · 6 个 Skill DAG · 3 个 Verification Engine</text>
