  <text x="100" y="341.5" fill="#64748b" font-size="10" font-family="monospace" text-anchor="start">Kahn 拓扑排序</text>
  <text x="100" y="354.0" fill="#64748b" font-size="10" font-family="monospace" text-anchor="start">同层并行 · 不同层串行</text>
  <text x="100" y="366.5" fill="#64748b" font-size="10" font-family="monospace" text-anchor="start">失败降级 · schema 兼容</text>
