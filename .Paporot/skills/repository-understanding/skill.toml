[skill]
name = "repository-understanding"
version = "0.1.0"
requires_paporot = ">=0.2.0"
description = "识别项目整体目标、技术栈、入口程序、核心业务能力"
timeout_secs = 30

[inputs]
required = ["repo_tree", "repo_files", "git_meta"]
optional = ["language_config"]

[outputs]
schema = "repository_understanding_output"

[llm_calls]
max_calls = 3
preferred_model = "deepseek-v4-pro"

[dependencies]

[quality]
checks = [
    "summary_must_cite_source_files",
    "no_hallucinated_goals"
]

# ── Procedure (documentation, actual logic in .wasm) ──
# Step 1: Locate project metadata
#   Scan: README, LICENSE, package manifest (Cargo.toml/package.json/go.mod), build scripts
#   Extract: project name, language, framework, architecture hints
# Step 2: Detect entrypoints
#   Rust: src/main.rs, bin/*
#   Go: cmd/*, main.go
#   Python: main.py, app.py
#   Node: index.ts, app.ts, server.ts
# Step 3: Infer project purpose
#   Evidence priority: README > public API > executable entrypoint > package description
# Step 4: Generate summary JSON

# ── Output Schema ──
# {
#   "project_name": "string",
#   "purpose": "string (1-2 sentences, evidence-backed)",
#   "languages": ["string"],
#   "frameworks": ["string"],
#   "entrypoints": ["string (relative path)"],
#   "architecture_style_candidates": ["modular_pipeline" | "layered" | "hexagonal" | "microservices" | "monolithic"],
#   "evidence": [
#     {"source_file": "string", "finding": "string"}
#   ]
# }
