[skill]
name = "runtime-flow-analysis"
version = "0.1.0"
requires_paporot = ">=0.2.0"
description = "发现端到端业务执行路径，从入口点追踪到副作用，标注每阶段职责"
timeout_secs = 30

[inputs]
required = ["ast", "call_graph", "entry_points"]

[outputs]
schema = "runtime_flow_analysis_output"

[llm_calls]
max_calls = 2
preferred_model = "deepseek-v4-pro"

[dependencies]
uses_outputs_from = ["dependency-analysis"]

[quality]
checks = [
    "every_flow_starts_from_entrypoint",
    "every_flow_ends_in_side_effect",
    "phases_are_mutually_exclusive"
]

# ── Procedure ──
# Step 1: Identify external triggers
#   HTTP routes, CLI commands, Message Queue handlers, Scheduler tasks
# Step 2: Follow function calls from entry_point
#   Depth-first traversal of call_graph starting from each entry
# Step 3: Label each node in the chain:
#   Input → Validation → Business Logic → Persistence → Output
# Step 4: Build execution chain per flow
# Step 5: Generate Mermaid flowchart

# ── Output Schema ──
# {
#   "flows": [
#     {
#       "name": "string (descriptive flow name)",
#       "trigger": "HTTP" | "CLI" | "MQ" | "Scheduler",
#       "entry_point": "string",
#       "path": ["string (module or function names in order)"],
#       "phases": {
#         "input": ["string"],
#         "validation": ["string"],
#         "business_logic": ["string"],
#         "persistence": ["string"],
#         "output": ["string"]
#       },
#       "side_effect": "string (final observable effect)"
#     }
#   ],
#   "mermaid": "string (Mermaid flowchart TD syntax)",
#   "flow_count": "number"
# }
