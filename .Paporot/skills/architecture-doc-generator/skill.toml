[skill]
name = "architecture-doc-generator"
version = "0.1.0"
requires_paporot = ">=0.2.0"
description = "聚合所有上游 Skill 输出，生成架构文档和 HTML Dashboard"
timeout_secs = 45

[inputs]
required = []

[outputs]
schema = "architecture_doc_output"

[llm_calls]
max_calls = 1
preferred_model = "deepseek-v4-pro"

[dependencies]
uses_outputs_from = ["repository-understanding", "module-discovery", "dependency-analysis", "runtime-flow-analysis", "behavior-boundary-discovery"]

[quality]
checks = [
    "all_sections_populated_if_upstream_ok",
    "skipped_sections_marked_explicitly",
    "mermaid_graphs_are_valid"
]

# ── Procedure ──
# Step 1: Collect all upstream outputs
# Step 2: Generate architecture.md sections:
#   1. Project Overview (from repository-understanding)
#   2. Module Catalog (from module-discovery)
#   3. Dependency Graph (from dependency-analysis)
#   4. Runtime Flows (from runtime-flow-analysis)
#   5. Behavioral Components (from behavior-boundary-discovery)
#   6. Extension Points (inferred)
#   7. Risks (aggregated)
# Step 3: Generate behavior.md
# Step 4: Generate coverage.md (if prd-coverage output available)
# Step 5: Generate dashboard.html with all data embedded
# Step 6: Write data/*.json files

# ── Output Schema ──
# {
#   "generated_files": ["string (relative paths)"],
#   "sections_status": {
#     "project_overview": "ok" | "skipped",
#     "module_catalog": "ok" | "skipped",
#     "dependency_graph": "ok" | "skipped",
#     "runtime_flows": "ok" | "skipped",
#     "behavioral_components": "ok" | "skipped",
#     "coverage": "ok" | "skipped"
#   },
#   "summary": "string (high-level analysis summary)"
# }
