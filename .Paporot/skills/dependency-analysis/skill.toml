[skill]
name = "dependency-analysis"
version = "0.1.0"
requires_paporot = ">=0.2.0"
description = "构建模块依赖图，计算耦合指标，检测架构违规和循环依赖"
timeout_secs = 30

[inputs]
required = ["import_graph", "symbol_references", "call_graph"]

[outputs]
schema = "dependency_analysis_output"

[llm_calls]
max_calls = 1
preferred_model = "deepseek-pro"

[dependencies]
uses_outputs_from = ["module-discovery"]

[quality]
checks = [
    "every_dependency_traceable",
    "detect_strongly_connected_components",
    "report_circular_references"
]

# ── Procedure ──
# Step 1: Build import graph from import_graph and call_graph
#   Example: agent → analysis, analysis → llm
# Step 2: Build symbol graph
#   Track: type references, trait/interface implementations
# Step 3: Calculate coupling metrics
#   fan-in (被多少模块依赖), fan-out (依赖多少模块), dependency depth, cyclic dependencies
# Step 4: Detect architecture violations
#   Patterns: UI→DB direct, Domain→Infrastructure, circular references
# Step 5: Generate Mermaid graph

# ── Output Schema ──
# {
#   "dependencies": [
#     {"from": "string", "to": "string", "type": "import" | "function_call" | "type_ref"}
#   ],
#   "cycles": [
#     {"modules": ["string"], "length": "number"}
#   ],
#   "high_coupling_modules": [
#     {"name": "string", "fan_in": "number", "fan_out": "number", "risk": "high" | "medium"}
#   ],
#   "architecture_violations": [
#     {"from": "string", "to": "string", "violation": "string"}
#   ],
#   "mermaid": "string (Mermaid graph TD syntax)"
# }
