[skill]
name = "module-discovery"
version = "0.1.0"
requires_paporot = ">=0.2.0"
description = "发现系统中的业务模块和技术模块，聚类相关文件并推断职责"
timeout_secs = 30

[inputs]
required = ["repo_tree", "ast_symbols", "import_graph"]

[outputs]
schema = "module_discovery_output"

[llm_calls]
max_calls = 2
preferred_model = "deepseek-pro"

[dependencies]
uses_outputs_from = ["repository-understanding"]

[quality]
checks = [
    "every_file_belongs_to_module",
    "module_description_max_2_sentences",
    "category_is_valid"
]

# ── Procedure ──
# Step 1: Build namespace map
#   Collect: modules, packages, namespaces from repo_tree and ast_symbols
# Step 2: Cluster related files
#   Group by directory proximity + import relationships
#   Example: parser/ lexer/ ast/ → "Parser Module"
# Step 3: Infer responsibility
#   From: directory names, public interfaces, comments, exported symbols
# Step 4: Classify
#   Categories: API, Service, Domain, Storage, Infrastructure, Utility

# ── Output Schema ──
# {
#   "modules": [
#     {
#       "name": "string (unique module identifier)",
#       "responsibility": "string (max 2 sentences)",
#       "files": ["string (relative paths)"],
#       "category": "API" | "Service" | "Domain" | "Storage" | "Infrastructure" | "Utility",
#       "public_symbols": ["string (exported function/struct names)"]
#     }
#   ],
#   "file_count": "number",
#   "module_count": "number"
# }
