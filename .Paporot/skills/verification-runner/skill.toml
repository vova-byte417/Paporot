[skill]
name = "verification-runner"
version = "0.1.0"
requires_paporot = "0.3.0"
description = "对所有上游 Artifact 执行 Contract 验证、收集 Evidence、在 FAIL 时保存 Replay Case"
timeout_secs = 30

[inputs]
required = []
optional = []

[outputs]
schema = """{
  "type": "object",
  "properties": {
    "overall_status": {"type": "string", "enum": ["PASS", "FAIL"]},
    "results": {"type": "array"},
    "replay_cases_saved": {"type": "integer"}
  }
}"""
format = "json"

[dependencies]
uses_outputs_from = [
  "architecture-doc-generator",
  "dependency-analysis",
  "runtime-flow-analysis",
  "module-discovery",
  "behavior-boundary-discovery",
  "repository-understanding"
]

[llm_calls]
max_calls = 0
preferred_model = ""
